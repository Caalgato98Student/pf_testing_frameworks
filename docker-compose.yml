services:
  db:
    image: mariadb:11.4
    container_name: inventario_db
    restart: unless-stopped
    environment:
      MARIADB_ROOT_PASSWORD: root
      MARIADB_DATABASE: inventario_reposteria
      MARIADB_USER: inventario
      MARIADB_PASSWORD: InventarioPass123!
    ports:
      - "3320:3306"
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  web:
    build: .
    container_name: inventario_web
    restart: unless-stopped
    env_file: .env.docker
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"
    volumes:
      - .:/app  # Dev: monta código para cambios en caliente
    command: ["/app/entrypoint.sh"]

volumes:
  db_data:
